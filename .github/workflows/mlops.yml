name: MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v

  train:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Setup DVC
        uses: iterative/setup-dvc@v1
      
      - name: Authenticate GCS
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=gcp-key.json
          dvc remote modify storage credentialpath gcp-key.json
      
      - name: DVC Pull Data
        run: dvc pull
        
      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py
        
      - name: Save metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            outputs/metrics.json
            outputs/report.txt

  eval:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download current metrics from train job
        uses: actions/download-artifact@v4
        with:
          name: performance-report
          path: outputs
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install google-cloud-storage
          
      - name: Safety Check & Gate (Bonus 4)
        run: |
          NEW_ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "New Accuracy: $NEW_ACC"
          
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=gcp-key.json
          
          python -c "
          from google.cloud import storage
          import json
          import os
          try:
              client = storage.Client()
              bucket = client.bucket('${{ secrets.GCS_BUCKET }}')
              blob = bucket.blob('outputs/metrics.json')
              blob.download_to_filename('old_metrics.json')
              old_acc = json.load(open('old_metrics.json'))['accuracy']
              print(f'OLD_ACC={old_acc}')
          except Exception as e:
              print('OLD_ACC=0') 
          " > compare_result.txt
          
          source compare_result.txt
          echo "Current Production Accuracy: $OLD_ACC"
          
          if (( $(echo "$NEW_ACC < 0.70" | bc -l) )); then
            echo "Failed: Accuracy too low!"
            exit 1
          fi
          
          if (( $(echo "$NEW_ACC < $OLD_ACC" | bc -l) )); then
            echo "Failed: Accuracy lower than production!"
            exit 1
          fi

  deploy:
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: performance-report
          path: outputs
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-cloud-storage
          
      - name: Upload model and metrics to GCS
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=gcp-key.json
          
          python -c "
          from google.cloud import storage
          import os
          client = storage.Client()
          bucket = client.bucket('${{ secrets.GCS_BUCKET }}')
          
          # Upload latest artifacts (Kem ca file report.txt cho Bonus 3)
          for f in ['models/model.pkl', 'models/scaler.pkl', 'outputs/metrics.json', 'outputs/report.txt']:
              if os.path.exists(f):
                  blob = bucket.blob(f.replace('models/', 'models/latest/'))
                  blob.upload_from_filename(f)
                  print(f'Uploaded {f}')
          "
